version: 2
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/seb-chavez/rtcheck/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: seb-chavez
      name: homebrew-tap
    homepage: https://github.com/seb-chavez/rtcheck
    description: "Check routing numbers against real-time payment networks"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
